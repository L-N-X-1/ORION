version: "3.9"

services:

  # ── Infrastructure ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [orion]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks: [orion]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [orion]

  influxdb:
    image: influxdb:2.7
    ports:
      - "18086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [orion]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/timeseries/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [orion]

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./ui/dashboard/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      influxdb:
        condition: service_healthy
    networks: [orion]

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks: [orion]

  # ── App Services ────────────────────────────────────────────────
  digital-twin:
    build: ./services/digital-twin
    ports:
      - "8001:8001"
    env_file: .env
    volumes:
      - ./data/csv:/data/telecom
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [orion]

  collector:
    build: ./services/collector
    ports:
      - "8002:8002"
    env_file: .env
    depends_on:
      kafka:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    networks: [orion]

  actuator:
    build: ./services/actuator
    ports:
      - "8003:8003"
    env_file: .env
    depends_on:
      digital-twin:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [orion]

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      digital-twin:
        condition: service_healthy
    networks: [orion]

  ai-agent:
    ports:
      - "8004:8003"  
    build: ./services/ai-agent
    env_file: .env
    depends_on:
      api-gateway:
        condition: service_started
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [orion]
    extra_hosts:
      - "host.docker.internal:host-gateway"  # exposes host to container on Linux
    environment:
      - COLLECTOR_URL=http://collector:8002
      - TWIN_URL=http://digital-twin:8001
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.2

  nginx:
    build: ./ui/nginx
    ports:
      - "80:80"
    depends_on:
      - api-gateway
      - grafana
    networks: [orion]

networks:
  orion:
    driver: bridge

volumes:
  influxdb_data:
  postgres_data:
  grafana_data:
  redis_data:
